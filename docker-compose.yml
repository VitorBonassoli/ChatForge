####################################################################################################
#######################################    DB CHATFORGE   ##########################################
####################################################################################################
services:
  postgres:
    image: postgres:15-alpine
    container_name: chatforge_postgres
    environment:  
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: 
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - chatforge_network 

####################################################################################################
#####################################    BACKEND CHATFORGE   #######################################
####################################################################################################

  backend:
    extra_hosts:
      - "host.docker.internal:host-gateway" 
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - chatforge_network
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "${BACKEND_PORT}:5000"
    depends_on:
      postgres:
        condition: service_healthy
    #command: gunicorn app.main:app --host 0.0.0.0 --port 5000 
    restart: unless-stopped

####################################################################################################
####################################    FRONTEND CHATFORGE   #######################################
####################################################################################################
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend
    networks:
      - chatforge_network

networks:
  chatforge_network:
    driver:  bridge
    enable_ipv6: false
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1